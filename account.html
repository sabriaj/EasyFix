<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account - EasyFix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="easyfix-icons-pack/favicon.ico" sizes="any">
</head>
<body class="bg-gray-100 min-h-screen">

  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="/" class="text-2xl font-black text-blue-600">EasyFix</a>
      <a href="/" class="text-sm font-bold text-gray-700 hover:text-blue-600">Kthehu te faqja kryesore</a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto p-4 md:p-8">
    <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden">
      
      <div class="bg-blue-600 text-white p-6 md:p-8">
        <h1 class="text-3xl font-extrabold">Account</h1>
        <p class="text-blue-100 mt-1">Menaxho profilin dhe kreditet tua</p>
      </div>

      <div class="p-6 md:p-8">
        <div id="loadingBox" class="text-gray-500 font-medium">
          Duke i ngarkuar të dhënat...
        </div>

        <div id="errorBox" class="hidden bg-red-50 text-red-700 border border-red-200 rounded-xl p-4 font-semibold"></div>

        <div id="accountBox" class="hidden">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="rounded-xl border border-gray-200 p-4">
              <div class="text-xs uppercase tracking-wide text-gray-400 font-bold mb-1">Emri</div>
              <div id="userName" class="text-lg font-bold text-gray-900">-</div>
            </div>

            <div class="rounded-xl border border-gray-200 p-4">
              <div class="text-xs uppercase tracking-wide text-gray-400 font-bold mb-1">Mbiemri</div>
              <div id="userSurname" class="text-lg font-bold text-gray-900">-</div>
            </div>

            <div class="rounded-xl border border-gray-200 p-4">
              <div class="text-xs uppercase tracking-wide text-gray-400 font-bold mb-1">Email</div>
              <div id="userEmail" class="text-lg font-bold text-gray-900 break-all">-</div>
            </div>

            <div class="rounded-xl border border-gray-200 p-4">
              <div class="text-xs uppercase tracking-wide text-gray-400 font-bold mb-1">Adresa</div>
              <div id="userAddress" class="text-lg font-bold text-gray-900">-</div>
            </div>
          </div>

          <div class="rounded-2xl bg-blue-50 border border-blue-200 p-6 mb-8 text-center">
            <div class="text-sm uppercase tracking-wide text-blue-500 font-bold mb-2">Kreditë tua</div>
            <div id="userCredits" class="text-4xl font-black text-blue-700">0</div>
          </div>

          <div class="flex flex-col sm:flex-row gap-3">
            <a href="/buy-credits.html"
              class="flex-1 text-center bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold">
              Blej Kredi
            </a>

            <button id="logoutBtn"
              class="flex-1 bg-gray-900 hover:bg-black text-white py-3 rounded-xl font-bold">
              Logout
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

<script>
const API_URL = "https://easyfix-dev-1.onrender.com";

function getUser() {
  return JSON.parse(localStorage.getItem("easyfix_user"));
}

function showError(message) {
  document.getElementById("loadingBox").classList.add("hidden");
  const errorBox = document.getElementById("errorBox");
  errorBox.classList.remove("hidden");
  errorBox.textContent = message;
}

function fillUserUI(user) {
  document.getElementById("userName").innerText = user.name || "-";
  document.getElementById("userSurname").innerText = user.surname || "-";
  document.getElementById("userEmail").innerText = user.email || "-";
  document.getElementById("userAddress").innerText = user.address || "-";
  document.getElementById("userCredits").innerText = user.credits ?? 0;
}

async function loadAccount() {
  const savedUser = getUser();

  if (!savedUser || !savedUser.id) {
    window.location.href = "/auth.html";
    return;
  }

  try {
    const res = await fetch(`${API_URL}/user/me/${savedUser.id}`);
    const data = await res.json();

    if (!res.ok || !data.success) {
      localStorage.removeItem("easyfix_user");
      window.location.href = "/auth.html";
      return;
    }

    localStorage.setItem("easyfix_user", JSON.stringify({
      id: data.user.id,
      name: data.user.name,
      surname: data.user.surname,
      address: data.user.address,
      email: data.user.email,
      credits: data.user.credits
    }));

    document.getElementById("loadingBox").classList.add("hidden");
    document.getElementById("accountBox").classList.remove("hidden");

    fillUserUI(data.user);

  } catch (err) {
    console.error(err);
    showError("Gabim gjatë ngarkimit të account-it.");
  }
}

document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem("easyfix_user");
  window.location.href = "/auth.html";
});

loadAccount();
</script>

</body>
</html>
