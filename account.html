<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account - EasyFix</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="max-w-2xl mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-xl p-8 mt-10">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-extrabold text-gray-900">Llogaria ime</h1>
        <a href="/" class="text-blue-600 font-bold hover:underline">← Kthehu</a>
      </div>

      <div id="loadingBox" class="text-gray-500 text-sm mb-4">
        Duke ngarkuar të dhënat...
      </div>

      <div id="accountBox" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Emri</label>
            <input id="name" type="text" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
          </div>

          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">Mbiemri</label>
            <input id="surname" type="text" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
            <input id="email" type="text" disabled class="w-full bg-gray-100 border border-gray-200 rounded-xl px-4 py-3 text-gray-500">
          </div>

          <div class="md:col-span-2">
            <label class="block text-sm font-semibold text-gray-700 mb-2">Adresa</label>
            <input id="address" type="text" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
          </div>

          <div class="md:col-span-2 bg-blue-50 rounded-xl p-4 border border-blue-200">
            <div class="text-xs text-blue-600 mb-1">Kreditë aktuale</div>
            <div id="credits" class="text-3xl font-extrabold text-blue-700">0</div>
          </div>
          <div class="border-t pt-6">
  <h2 class="text-xl font-bold text-gray-900 mb-4">Ndrysho Password</h2>

  <div class="grid grid-cols-1 gap-4">
    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Password aktual</label>
      <input id="currentPassword" type="password"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Password i ri</label>
      <input id="newPassword" type="password"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 mb-2">Konfirmo password</label>
      <input id="confirmNewPassword" type="password"
        class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500">
    </div>
  </div>

  <button id="changePasswordBtn"
    class="mt-4 w-full bg-gray-900 hover:bg-black text-white py-3 rounded-xl font-bold">
    Ndrysho Password
  </button>

  <p id="passwordStatus" class="text-sm font-semibold mt-3"></p>
</div>

        </div>

        <p id="status" class="text-sm font-semibold"></p>

        <div class="flex flex-col sm:flex-row gap-3">
          <button id="saveBtn"
            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold">
            Ruaj ndryshimet
          </button>

          <a href="/buy-credits.html"
             class="flex-1 bg-green-600 hover:bg-green-700 text-white text-center py-3 rounded-xl font-bold">
            Blej kredi
          </a>

          <button id="logoutBtn"
            class="flex-1 bg-gray-900 hover:bg-black text-white py-3 rounded-xl font-bold">
            Logout
          </button>
        </div>
      </div>

      <div id="errorBox" class="hidden text-red-600 text-sm font-semibold mt-4"></div>
    </div>
  </div>

<script>
const API_URL = "https://easyfix-dev-1.onrender.com";

function getUser() {
  return JSON.parse(localStorage.getItem("easyfix_user"));
}

function setUser(user) {
  localStorage.setItem("easyfix_user", JSON.stringify(user));
}

function showError(msg) {
  const errorBox = document.getElementById("errorBox");
  const loadingBox = document.getElementById("loadingBox");
  const accountBox = document.getElementById("accountBox");

  loadingBox.classList.add("hidden");
  accountBox.classList.add("hidden");
  errorBox.classList.remove("hidden");
  errorBox.innerText = msg;
}

function showStatus(msg, isError = false) {
  const el = document.getElementById("status");
  el.innerText = msg;
  el.className = isError
    ? "text-sm font-semibold text-red-600"
    : "text-sm font-semibold text-green-600";
}

async function loadAccount() {
  const user = getUser();

  if (!user || !user.id) {
    window.location.href = "/auth.html";
    return;
  }

  try {
    const res = await fetch(`${API_URL}/user/me/${user.id}`);
    const data = await res.json();

    if (!res.ok || !data.success) {
      localStorage.removeItem("easyfix_user");
      window.location.href = "/auth.html";
      return;
    }

    document.getElementById("name").value = data.user.name || "";
    document.getElementById("surname").value = data.user.surname || "";
    document.getElementById("email").value = data.user.email || "";
    document.getElementById("address").value = data.user.address || "";
    document.getElementById("credits").innerText = data.user.credits ?? 0;

    setUser({
      id: data.user.id,
      email: data.user.email,
      credits: data.user.credits
    });

    document.getElementById("loadingBox").classList.add("hidden");
    document.getElementById("accountBox").classList.remove("hidden");
  } catch (err) {
    console.error(err);
    showError("Gabim gjatë ngarkimit të llogarisë.");
  }
}

async function saveProfile() {
  const user = getUser();

  if (!user || !user.id) {
    window.location.href = "/auth.html";
    return;
  }

  const name = document.getElementById("name").value.trim();
  const surname = document.getElementById("surname").value.trim();
  const address = document.getElementById("address").value.trim();

  if (!name || !surname || !address) {
    showStatus("Plotëso të gjitha fushat.", true);
    return;
  }

  try {
    const res = await fetch(`${API_URL}/user/me/${user.id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        surname,
        address
      })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      showStatus(data.error_code || "Gabim gjatë ruajtjes.", true);
      return;
    }

    setUser({
      id: data.user.id,
      email: data.user.email,
      credits: data.user.credits
    });

    document.getElementById("credits").innerText = data.user.credits ?? 0;

    showStatus("Të dhënat u ruajtën me sukses.");
  } catch (err) {
    console.error(err);
    showStatus("Gabim serveri.", true);
  }
}

function showPasswordStatus(msg, isError = false) {
  const el = document.getElementById("passwordStatus");
  el.innerText = msg;
  el.className = isError
    ? "text-sm font-semibold mt-3 text-red-600"
    : "text-sm font-semibold mt-3 text-green-600";
}

async function changePassword() {
  const user = getUser();

  if (!user || !user.id) {
    window.location.href = "/auth.html";
    return;
  }

  const currentPassword = document.getElementById("currentPassword").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmNewPassword = document.getElementById("confirmNewPassword").value.trim();

  if (!currentPassword || !newPassword || !confirmNewPassword) {
    showPasswordStatus("Plotëso të gjitha fushat.", true);
    return;
  }

  if (newPassword.length < 6) {
    showPasswordStatus("Password i ri duhet të ketë të paktën 6 karaktere.", true);
    return;
  }

  if (newPassword !== confirmNewPassword) {
    showPasswordStatus("Password-at nuk përputhen.", true);
    return;
  }

  try {
    const res = await fetch(`${API_URL}/user/password/${user.id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        currentPassword,
        newPassword
      })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      showPasswordStatus(data.error_code || "Gabim gjatë ndryshimit të password-it.", true);
      return;
    }

    document.getElementById("currentPassword").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("confirmNewPassword").value = "";

    showPasswordStatus("Password u ndryshua me sukses.");
  } catch (err) {
    console.error(err);
    showPasswordStatus("Gabim serveri.", true);
  }
}

document.getElementById("saveBtn").addEventListener("click", saveProfile);

document.getElementById("logoutBtn").addEventListener("click", () => {
  localStorage.removeItem("easyfix_user");
  window.location.href = "/auth.html";
});
document.getElementById("changePasswordBtn").addEventListener("click", changePassword);
loadAccount();
</script>

</body>
</html>
