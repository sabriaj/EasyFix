<!DOCTYPE html>
<html>
<body style="font-family:sans-serif; text-align:center; padding:40px;">

<h2 id="title">Login</h2>

<!-- SIGNUP EXTRA -->
<div id="signupFields" style="display:none;">
  <input id="name" placeholder="Emri"><br><br>
  <input id="surname" placeholder="Mbiemri"><br><br>
  <input id="address" placeholder="Adresa"><br><br>
</div>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<div id="confirmBox" style="display:none;">
  <input id="confirm" type="password" placeholder="Konfirmo Password"><br><br>
</div>

<button onclick="submitForm()">Vazhdo</button>

<br><br>
<a href="#" onclick="toggleMode()">Kaloni në Signup / Login</a>

<script>
const API_URL = "https://easyfix-dev-1.onrender.com";

let mode = "login";

function toggleMode() {
  mode = mode === "login" ? "signup" : "login";

  document.getElementById("title").innerText = mode === "login" ? "Login" : "Signup";

  document.getElementById("signupFields").style.display =
    mode === "signup" ? "block" : "none";

  document.getElementById("confirmBox").style.display =
    mode === "signup" ? "block" : "none";
}

async function submitForm() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (mode === "login") {
    // LOGIN
    const res = await fetch(`${API_URL}/user/login`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Gabim login");
      return;
    }

    localStorage.setItem("easyfix_user", JSON.stringify({
      id: data.user.id,
      email: data.user.email
    }));

    window.location.href = "/";
  } else {
    // SIGNUP
    const name = document.getElementById("name").value;
    const surname = document.getElementById("surname").value;
    const address = document.getElementById("address").value;
    const confirm = document.getElementById("confirm").value;

    if (!name || !surname || !address || !email || !password || !confirm) {
      alert("Plotëso të gjitha fushat");
      return;
    }

    if (password !== confirm) {
      alert("Password nuk përputhen");
      return;
    }

    const res = await fetch(`${API_URL}/user/signup`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        name,
        surname,
        address,
        email,
        password
      })
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.error || "Gabim signup");
      return;
    }

    localStorage.setItem("easyfix_user", JSON.stringify({
      id: data.user.id,
      email: data.user.email
    }));

    alert("Account u krijua");

    window.location.href = "/";
  }
}
</script>

</body>
</html>
