<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyFix - Login / Signup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="easyfix-icons-pack/favicon.ico" sizes="any">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-extrabold text-gray-900">EasyFix</h1>
      <p id="subtitle" class="text-sm text-gray-600 mt-2">Hyr në llogarinë tënde</p>
    </div>

    <h2 id="title" class="text-2xl font-bold text-center text-gray-900 mb-6">Login</h2>

    <div id="statusBox" class="hidden mb-4 rounded-xl px-4 py-3 text-sm font-semibold"></div>

    <form id="authForm" class="space-y-4">
      <div id="signupFields" class="hidden space-y-4">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Emri</label>
          <input id="name" type="text" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-blue-500" placeholder="Emri">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Mbiemri</label>
          <input id="surname" type="text" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-blue-500" placeholder="Mbiemri">
        </div>

        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1">Adresa</label>
          <input id="address" type="text" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-blue-500" placeholder="Adresa">
        </div>
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
        <input id="email" type="email" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-blue-500" placeholder="Email">
      </div>

      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
        <input id="password" type="password" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-blue-500" placeholder="Password">
      </div>

      <div id="confirmBox" class="hidden">
        <label class="block text-sm font-semibold text-gray-700 mb-1">Konfirmo Password</label>
        <input id="confirm" type="password" class="w-full border border-gray-300 rounded-xl px-4 py-3 outline-none focus:border-blue-500" placeholder="Konfirmo Password">
      </div>

      <button type="submit" id="submitBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-3 font-bold transition">
        Login
      </button>
    </form>

    <div class="text-center mt-5">
      <button id="toggleBtn" class="text-blue-600 font-bold hover:underline">
        Nuk ke account? Krijo një
      </button>
    </div>

    <div class="text-center mt-4">
      <a href="/auth.html" class="text-sm text-gray-500 hover:text-gray-700">Kthehu mbrapa</a>
    </div>
  </div>

<script>
const API_URL = "https://easyfix-dev-1.onrender.com";

const params = new URLSearchParams(window.location.search);
const requiredRole = params.get("role") || "client";

let mode = "login";

function showStatus(msg, type = "error") {
  const box = document.getElementById("statusBox");
  box.classList.remove("hidden");

  if (type === "success") {
    box.className = "mb-4 rounded-xl px-4 py-3 text-sm font-semibold bg-green-100 text-green-700";
  } else if (type === "info") {
    box.className = "mb-4 rounded-xl px-4 py-3 text-sm font-semibold bg-blue-100 text-blue-700";
  } else {
    box.className = "mb-4 rounded-xl px-4 py-3 text-sm font-semibold bg-red-100 text-red-700";
  }

  box.textContent = msg;
}

function updateTexts() {
  const isPro = requiredRole === "pro";
  const isSignup = mode === "signup";

  const title = document.getElementById("title");
  const subtitle = document.getElementById("subtitle");
  const signupFields = document.getElementById("signupFields");
  const confirmBox = document.getElementById("confirmBox");
  const submitBtn = document.getElementById("submitBtn");
  const toggleBtn = document.getElementById("toggleBtn");

  if (isPro) {
    title.innerText = "Login si Mjeshtër";
    subtitle.innerText = "Hyr në dashboard-in tënd profesional";
    signupFields.classList.add("hidden");
    confirmBox.classList.add("hidden");
    submitBtn.innerText = "Login";
    toggleBtn.innerText = "Nuk ke account? Regjistrohu si mjeshtër";
    return;
  }

  title.innerText = isSignup ? "Signup" : "Login";
  subtitle.innerText = isSignup
    ? "Krijo llogarinë tënde si klient"
    : "Hyr në llogarinë tënde si klient";

  signupFields.classList.toggle("hidden", !isSignup);
  confirmBox.classList.toggle("hidden", !isSignup);
  submitBtn.innerText = isSignup ? "Krijo account" : "Login";
  toggleBtn.innerText = isSignup
    ? "Ke account? Bëj login"
    : "Nuk ke account? Krijo një";
}

function setMode(newMode) {
  mode = newMode;
  updateTexts();
  document.getElementById("statusBox").classList.add("hidden");
}

document.getElementById("toggleBtn").addEventListener("click", () => {
  if (requiredRole === "pro") {
    window.location.href = "/register.html";
    return;
  }

  setMode(mode === "login" ? "signup" : "login");
});

document.getElementById("authForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  if (!email || !password) {
    showStatus("Plotëso email dhe password.");
    return;
  }

  // PRO LOGIN
  if (requiredRole === "pro") {
    try {
      showStatus("Duke u kyçur si mjeshtër...", "info");

      const res = await fetch(`${API_URL}/user/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showStatus(data.error_code || "Gabim login");
        return;
      }

      if (data.user.role !== "pro") {
        showStatus("Ky account nuk është account i mjeshtrit.");
        return;
      }

      localStorage.setItem("easyfix_user", JSON.stringify({
        id: data.user.id,
        name: data.user.name,
        surname: data.user.surname,
        address: data.user.address,
        email: data.user.email,
        role: data.user.role,
        credits: data.user.credits
      }));

      showStatus("Login me sukses.", "success");

      setTimeout(() => {
        window.location.href = "/pro-dashboard.html";
      }, 700);
    } catch (err) {
      console.error(err);
      showStatus("Gabim serveri");
    }

    return;
  }

  // CLIENT LOGIN
  if (mode === "login") {
    try {
      showStatus("Duke u kyçur...", "info");

      const res = await fetch(`${API_URL}/user/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showStatus(data.error_code || "Gabim login");
        return;
      }

      if (data.user.role !== "client") {
        showStatus("Ky account nuk është account i klientit.");
        return;
      }

      localStorage.setItem("easyfix_user", JSON.stringify({
        id: data.user.id,
        name: data.user.name,
        surname: data.user.surname,
        address: data.user.address,
        email: data.user.email,
        role: data.user.role,
        credits: data.user.credits
      }));

      showStatus("Login me sukses.", "success");

      setTimeout(() => {
        window.location.href = "/";
      }, 700);
    } catch (err) {
      console.error(err);
      showStatus("Gabim serveri");
    }

    return;
  }

  // CLIENT SIGNUP
  const name = document.getElementById("name").value.trim();
  const surname = document.getElementById("surname").value.trim();
  const address = document.getElementById("address").value.trim();
  const confirm = document.getElementById("confirm").value;

  if (!name || !surname || !address || !email || !password || !confirm) {
    showStatus("Plotëso të gjitha fushat.");
    return;
  }

  if (password.length < 6) {
    showStatus("Password duhet me pas të paktën 6 karaktere.");
    return;
  }

  if (password !== confirm) {
    showStatus("Password nuk përputhen.");
    return;
  }

  try {
    showStatus("Duke krijuar account...", "info");

    const res = await fetch(`${API_URL}/user/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name,
        surname,
        address,
        email,
        password
      })
    });

    const data = await res.json();

    if (!res.ok) {
      showStatus(data.error_code || "Gabim signup");
      return;
    }

    localStorage.setItem("easyfix_user", JSON.stringify({
      id: data.user.id,
      name: data.user.name,
      surname: data.user.surname,
      address: data.user.address,
      email: data.user.email,
      role: data.user.role,
      credits: data.user.credits
    }));

    showStatus("Account u krijua me sukses.", "success");

    setTimeout(() => {
      window.location.href = "/";
    }, 700);
  } catch (err) {
    console.error(err);
    showStatus("Gabim serveri");
  }
});

setMode("login");
</script>
</body>
</html>
